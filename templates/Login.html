<!-- ================= LOGIN.HTML ================= -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StudyFlow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="login-screen container py-5 d-flex align-items-center justify-content-center min-vh-100">

  <div class="card-custom login-card p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">StudyFlow</h1>
            <p class="text-secondary">Seu app de estudos</p>
        </div>

        <button id="themeToggle" class="btn btn-theme">
            🌙
        </button>
    </div>

    <input type="email"
           class="form-control custom-input mb-3"
           placeholder="Seu e-mail">

    <input type="password"
           class="form-control custom-input mb-4"
           placeholder="Sua senha">

    <a href="Dashboard.html"
       class="btn btn-main w-100 py-2 mb-3">
        Entrar
    </a>

    <a href="Registrar.html"
       class="btn btn-register w-100 py-2 mb-3">
        Registrar-se
    </a>
</div>

</section>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar-se - StudyFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <section class="login-screen container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card-custom login-card p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="fw-bold">StudyFlow</h1>
                </div>
        
                <button id="themeToggle" class="btn btn-theme">
                    🌙
                </button>
            </div>
        <div class="card-custom login-card p-4">
        
        <h2 class="text-center mb-4">Criar Conta</h2>
        
        <input type="text" class="form-control custom-input mb-3" placeholder="Nome Completo">
        
        <input type="text" class="form-control custom-input mb-3" placeholder="CPF">
        
        <input type="number" class="form-control custom-input mb-3" placeholder="Idade">
        
        <input type="tel" class="form-control custom-input mb-3" placeholder="Telefone">
        
        <input type="email" class="form-control custom-input mb-3" placeholder="E-mail">
        
        <input type="password" class="form-control custom-input mb-4" placeholder="Senha">
        
        <a href="Dashboard.html" class="btn btn-main w-100 mb-3">
        Criar Conta
        </a>
        
        <button onclick="history.back()" class="btn btn-back w-100">
        Voltar
        </button>
        
        </div>
        
        </section>
</body>
</html>

{% extends 'layouts/base.html' %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-screen">


<div class="card-custom login-card">

    <div style="padding:40px">

        <h1 style="text-align:center;margin-bottom:10px;">
            StudyFlow
        </h1>

        <p style="text-align:center;color:gray;margin-bottom:30px;">
            Organize seus estudos e alcance suas metas
        </p>

        <form method="POST">

            {% csrf_token %}

            <div style="margin-bottom:15px;">
                <input
                    class="custom-input"
                    type="text"
                    name="username"
                    placeholder="Usuário"
                    required
                    style="width:100%;box-sizing:border-box;"
                >
            </div>

            <div style="margin-bottom:25px;">
                <input
                    class="custom-input"
                    type="password"
                    name="password"
                    placeholder="Senha"
                    required
                    style="width:100%;box-sizing:border-box;"
                >
            </div>

            <button
                class="btn-register"
                type="submit"
                style="width:100%;padding:14px;"
            >
                Entrar
            </button>

        </form>

        <div style="text-align:center;margin-top:20px;">

            <a
                href="/cadastro/"
                style="color:#6c5ce7;text-decoration:none;"
            >
                Criar conta
            </a>

        </div>

    </div>

</div>

</div>

{% endblock %}
